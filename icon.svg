<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#636e72"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Pill capsule -->
  <g transform="translate(256,240) rotate(-30)">
    <!-- Left half -->
    <rect x="-120" y="-50" width="120" height="100" rx="50" fill="#e74c3c"/>
    <!-- Right half -->
    <rect x="0" y="-50" width="120" height="100" rx="50" fill="#fff" opacity=".9"/>
    <!-- Divider line -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#2d3436" stroke-width="3" opacity=".3"/>
    <!-- Shine -->
    <ellipse cx="-50" cy="-25" rx="35" ry="10" fill="#fff" opacity=".25" transform="rotate(-10)"/>
  </g>
  <!-- Plus sign -->
  <g transform="translate(370,370)">
    <circle r="52" fill="#27ae60"/>
    <rect x="-24" y="-6" width="48" height="12" rx="6" fill="#fff"/>
    <rect x="-6" y="-24" width="12" height="48" rx="6" fill="#fff"/>
  </g>
  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" fill="#ffeaa7" font-family="-apple-system,sans-serif" font-size="48" font-weight="700">MEDS</text>
</svg>
